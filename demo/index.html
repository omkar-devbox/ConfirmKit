<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConfirmKit • Premium Vanilla Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #111827;
            --text-muted: #6b7280;
            --card: #ffffff;
            --border: #f3f4f6;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --log-bg: #f9fafb;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #030712;
                --text: #f9fafb;
                --text-muted: #9ca3af;
                --card: #111827;
                --border: #1f2937;
                --primary: #3b82f6;
                --primary-hover: #60a5fa;
                --log-bg: #0f172a;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            transition: background-color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.125rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 24px;
            font-weight: 700;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 48px;
        }

        @media (max-width: 480px) {
            .button-grid {
                grid-template-columns: 1fr;
            }
        }

        .demo-btn {
            padding: 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .demo-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .demo-btn.primary {
            background: var(--primary);
            color: #fff;
            border: none;
        }

        .demo-btn.primary:hover {
            background: var(--primary-hover);
        }

        #log {
            background: var(--log-bg);
            border-radius: 16px;
            padding: 20px;
            font-family: 'ui-monospace', 'SFMono-Regular', Menlo, Monaco, Consolas, monospace;
            font-size: 0.8125rem;
            height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .log-entry {
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            line-height: 1.4;
        }

        .log-time {
            color: var(--text-muted);
            opacity: 0.6;
            white-space: nowrap;
        }

        .log-msg { word-break: break-word; }

        .log-success { color: #10b981; }
        .log-cancel { color: #ef4444; }
        .demo-btn.danger {
            background: #fef2f2;
            color: #dc2626;
            border-color: #fee2e2;
        }

        .demo-btn.danger:hover {
            background: #fee2e2;
            border-color: #ef4444;
        }

        .demo-btn.success {
            background: #f0fdf4;
            color: #166534;
            border-color: #dcfce7;
        }

        .demo-btn.success:hover {
            background: #dcfce7;
            border-color: #22c55e;
        }

        .demo-btn.warning {
            background: #fffbeb;
            color: #92400e;
            border-color: #fef3c7;
        }

        .demo-btn.warning:hover {
            background: #fef3c7;
            border-color: #f59e0b;
        }

        footer {
            margin-top: 48px;
            text-align: center;
            font-size: 0.8125rem;
            color: var(--text-muted);
        }

        footer code {
            padding: 2px 6px;
            background: var(--log-bg);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ConfirmKit</h1>
            <p class="subtitle">Production-grade Vanilla JS Dialogs</p>
        </header>

        <main class="card">
            <h2 class="section-title">✨ Interactive Showcase</h2>
            <div class="button-grid">
                <!-- NEW PRESETS SECTION -->
                <button id="btn-success-preset" class="demo-btn success">
                    <span>Success Variant</span>
                </button>
                <button id="btn-error-preset" class="demo-btn danger">
                    <span>Error Variant</span>
                </button>
                <button id="btn-warning-preset" class="demo-btn warning">
                    <span>Warning Variant</span>
                </button>
                <button id="btn-info-preset" class="demo-btn primary">
                    <span>Info Variant</span>
                </button>
                <button id="btn-custom-preset" class="demo-btn">
                    <span>Custom Preset</span>
                </button>
                <button id="btn-custom-icon" class="demo-btn">
                    <span>HTML/SVG Icon</span>
                </button>

                <hr style="grid-column: 1 / -1; border: 0; border-top: 1px solid var(--border); margin: 8px 0;">

                <button id="btn-default" class="demo-btn primary">
                    <span>Default Confirm</span>
                </button>
                <button id="btn-custom" class="demo-btn">
                    <span>Glassmorphism</span>
                </button>
                <button id="btn-async" class="demo-btn">
                    <span>Async Loading</span>
                </button>
                <button id="btn-queue" class="demo-btn">
                    <span>Queue Logic</span>
                </button>
                <button id="btn-flow" class="demo-btn">
                    <span>Sequential Flow</span>
                </button>
                <button id="btn-autoclose" class="demo-btn">
                    <span>Auto-close (3s)</span>
                </button>
                <button id="btn-keyboard" class="demo-btn">
                    <span>Custom Keys</span>
                </button>
                <button id="btn-modal" class="demo-btn">
                    <span>Force Modal</span>
                </button>
                <button id="btn-advanced" class="demo-btn">
                    <span>Custom Context</span>
                </button>
                <button id="btn-synergy-1" class="demo-btn success">
                    <span>Merge: Success + Glass</span>
                </button>
                <button id="btn-synergy-2" class="demo-btn danger">
                    <span>Merge: Custom + Emoji</span>
                </button>
            </div>

            <h2 class="section-title">📜 System Log</h2>
            <div id="log">
                <div class="log-entry">
                    <span class="log-time">10:00:00</span>
                    <span class="log-msg log-info">Runtime initialized. Click a button to begin.</span>
                </div>
            </div>
        </main>

        <footer>
            Built with <code>@confirmkit/core</code> & <code>@confirmkit/vanilla</code>
        </footer>
    </div>
    <script type="module" src="./demo.ts"></script>
</body>
</html>
