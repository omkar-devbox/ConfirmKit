<div class="glass-dialog" [class.loading]="state.loading">
  <div class="glass-header">
    <div class="icon-blob"></div>
    <h2>{{ getTitle() }}</h2>
  </div>

  <div class="glass-body">
    <p>{{ getMessage() }}</p>
  </div>

  <div class="glass-footer">
    <button 
      *ngFor="let button of getButtons()"
      [attr.data-variant]="button.variant"
      [disabled]="button.disabled || state.loading"
      (click)="handleAction(button.id || '')"
      class="glass-btn"
    >
      <span *ngIf="button.loading" class="loader"></span>
      {{ button.label }}
    </button>
  </div>
</div>
